observatory = "OMU1P85M"
location = { lon = "138.472153deg", lat = "35.940874deg", height = "1386m" }
"observation_frequency[GHz]" =  115.271204

simulator = false

alert_interval_sec = 1
record_every_n_spectral_data = 1

[ros]
service_timeout_sec = 10
communication_deadline_sec = 0.01
logging_interval_sec = 2
topic_scan_interval_sec = 1

[antenna]
pid_param_az = [1.0, 0.0, 0.0]
pid_param_el = [1.0, 0.0, 0.0]
drive_range_az = ["0deg", "360deg"]
drive_range_el = ["10deg", "90deg"]
drive_warning_limit_az = ["10deg", "350deg"]
drive_warning_limit_el = ["20deg", "80deg"]
drive_critical_limit_az = ["5deg", "355deg"]
drive_critical_limit_el = ["15deg", "85deg"]
"pointing_accuracy[arcsec]" = 10
pointing_parameter_path = "./pointing_param.toml"
"scan_margin[deg]" = 0.1
"max_acceleration_az[deg s-2]" = 1.6
"max_acceleration_el[deg s-2]" = 1.6
"max_speed_az[deg/s]" = 1.6
"max_speed_el[deg/s]" = 1.6
command_frequency = 50
enc_frequency = 20
command_offset_sec = 1.0
min_buffer_sec = 0.5
max_buffer_sec = 1.5
max_groups_per_convert = 10
command_group_duration_sec = 1

[antenna_encoder_unwrap.az]
enabled = true
mode = "absolute_modulo"
"period[deg]" = 360.0
"raw_min[deg]" = 0.0
"raw_max[deg]" = 360.0
"zero_offset[deg]" = 0.0
sign = 1
"max_jump[deg]" = 5.0
state_path = "~/.necst/antenna_az_unwrap_state.json"
startup_policy = "recover_if_raw_matches"
"state_heartbeat_sec[s]" = 5.0
"state_warn_age_sec[s]" = 86400.0
"state_raw_tolerance[deg]" = 5.0

[chopper_motor]
_ = "CPZ7415V"
rsw_id = 0
position = { insert = 4750, remove = 19700 }
start_mode = "const"
low_limit = 0
high_limit = 20000
DI_ch = {ready = "", alarm = "", move = ""}
DO_ch = {zeropoint = 4, brake =  "", stop = "", removealarm = 3}

[antenna_motor]
_ = "CPZ7415V"
rsw_id = 0
useaxes = "xyu"
x_mode = "jog"
y_mode = "jog"
u_mode = "ptp"
x_pulse_conf = { PULSE = 1, OUT = 0, DIR = 0, WAIT = 0, DUTY = 0 }
y_pulse_conf = { PULSE = 1, OUT = 0, DIR = 0, WAIT = 0, DUTY = 0 }
u_pulse_conf = { PULSE = 1, OUT = 1, DIR = 1, WAIT = 0, DUTY = 0 }
x_motion = { clock = 59, acc_mode = "acc_normal", low_speed = 10, speed = 5000, acc = 50, dec = 50, step = 1 }
y_motion = { clock = 59, acc_mode = "acc_normal", low_speed = 10, speed = 5000, acc = 50, dec = 50, step = 1 }
u_motion = { clock = 299, acc_mode = "acc_normal", low_speed = 10, speed = 10000, acc = 50, dec = 50, step = 5000 }
channel = { az = "y", el = "x", chopper = "u" }
speed_to_pulse_factor_az = -200000
speed_to_pulse_factor_el = -200000

[antenna_encoder.az]
_ = "ND287"
port = "/dev/ttyUSB2"

[antenna_encoder.el]
_ = "ND287"
port = "/dev/ttyUSB1"

# Absolute-modulo Az encoder unwrap.
# Disabled by default in global configs; OMU 1.85m can enable this when
# observing across Az=0 with a widened continuous drive range, e.g. [-100, 400] deg.
[antenna_encoder_unwrap.az]
enabled = false
mode = "absolute_modulo"
"period[deg]" = 360.0
"raw_min[deg]" = 0.0
"raw_max[deg]" = 360.0
"zero_offset[deg]" = 0.0
sign = 1
"max_jump[deg]" = 5.0
state_path = "~/.necst/antenna_az_unwrap_state.json"
startup_policy = "recover_if_raw_matches"
# Discard this many finite out-of-nominal-range Az raw samples immediately
# after encoder_readout startup before accepting periodic aliases such as
# 727 deg = 2*360 + 7 deg.  This protects against RS-232C first-read garbage
# while still allowing legitimate modulo aliases after the startup grace window.
startup_discard_raw_out_of_range_samples = 3
"state_heartbeat_sec[s]" = 5.0
# Age alone does not reject a state file.  If a raw-matching state is older
# than this, progress shows state=old so the operator notices it.
"state_warn_age_sec[s]" = 86400.0
# State recovery requires the current raw Az to match the saved raw Az within
# this tolerance.  If not, the state is ignored and the current raw reading is
# auto-initialized only when the branch candidate is unique.
"state_raw_tolerance[deg]" = 5.0

